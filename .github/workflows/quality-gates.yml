name: quality-gates

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality:
    name: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.29.2

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: Verify commands
        run: bash .codex/scripts/run_verify_commands.sh

      - name: Run integration gates
        run: pnpm gate:all

      - name: Generate unit test coverage
        run: pnpm test:unit:coverage

      - name: Diff coverage
        run: |
          python -m pip install --upgrade pip diff-cover
          COMPARE_BRANCH=origin/main
          if ! git rev-parse --verify "$COMPARE_BRANCH" >/dev/null 2>&1; then
            COMPARE_BRANCH=origin/master
          fi
          diff-cover coverage/lcov.info --compare-branch="$COMPARE_BRANCH" --fail-under=90

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/
